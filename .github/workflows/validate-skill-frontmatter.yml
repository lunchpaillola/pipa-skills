name: Validate Skills

on:
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "skills/**/evals/*.json"
      - "scripts/validate_skill_frontmatter.rb"
      - "scripts/validate_skill_evals.rb"
      - ".github/workflows/validate-skill-frontmatter.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**/SKILL.md"
      - "skills/**/evals/*.json"
      - "scripts/validate_skill_frontmatter.rb"
      - "scripts/validate_skill_evals.rb"
      - ".github/workflows/validate-skill-frontmatter.yml"

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Validate SKILL.md frontmatter
        run: ruby scripts/validate_skill_frontmatter.rb

      - name: Validate skill eval fixtures
        run: ruby scripts/validate_skill_evals.rb
